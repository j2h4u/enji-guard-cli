[project]
name = "enji-guard-cli"
version = "0.1.0"
description = "Command-line tools for Enji Guard."
license = "PolyForm-Noncommercial-1.0.0"
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28.1,<1",
    "httpx-retries>=0.4,<1",
    "mcp[cli]>=1.28.1,<2",
    "typer>=0.26.7",
]

[project.scripts]
enji-guard = "enji_guard_cli.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/enji_guard_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
tmp_path_retention_policy = "failed"
tmp_path_retention_count = 1

[tool.ruff]
src = ["src", "scripts", "tests"]
line-length = 120
target-version = "py314"
extend-exclude = [".planning"]

[tool.ruff.lint]
explicit-preview-rules = true
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
    "B",
    "BLE",
    "UP",
    "C4",
    "PIE",
    "RET",
    "ISC",
    "RSE",
    "FLY",
    "FURB",
    "RUF",
    "PERF",
    "SIM",
    "PTH",
    "DTZ",
    "PGH",
    "PLE",
    "LOG",
    "G",
    "N818",
    "C90",
    "PLR09",
    "PLR17",
    "PLR2004",
]
ignore = ["ISC001"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "DTZ",
    "PERF401",
    "PLR2004",
]

[tool.ruff.format]
quote-style = "double"

[tool.pyright]
include = ["src/enji_guard_cli", "scripts", "tests"]
pythonVersion = "3.14"
typeCheckingMode = "standard"
reportAny = "error"
reportExplicitAny = "error"
reportUnknownVariableType = "none"
reportUnknownArgumentType = "none"
reportUnknownMemberType = "none"
reportUnknownParameterType = "none"
reportUnknownLambdaType = "none"
reportMissingParameterType = "error"
reportMissingTypeArgument = "none"
reportUnannotatedClassAttribute = "none"
reportUnusedCallResult = "none"
reportImplicitStringConcatenation = "none"
reportPrivateUsage = "none"

[tool.vulture]
paths = ["src/enji_guard_cli", "tests"]
min_confidence = 80
ignore_decorators = [
    "@app.callback",
    "@app.command",
]

[tool.deptry]
known_first_party = ["enji_guard_cli"]
per_rule_ignores = { DEP004 = ["radon"] }

[tool.coverage.run]
source = ["src/enji_guard_cli"]
branch = true
sigterm = true

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.importlinter]
root_package = "enji_guard_cli"
include_external_packages = true

[[tool.importlinter.contracts]]
id = "core-independent-from-entrypoints"
name = "Core stays independent from CLI and MCP entrypoints"
type = "forbidden"
source_modules = ["enji_guard_cli.core"]
forbidden_modules = ["enji_guard_cli.cli", "enji_guard_cli.runtime", "enji_guard_cli.mcp_server"]

[[tool.importlinter.contracts]]
id = "adapter-and-infrastructure-independent-from-core-and-entrypoints"
name = "API adapter and infrastructure stay below core and entrypoints"
type = "forbidden"
source_modules = [
    "enji_guard_cli.auth",
    "enji_guard_cli.enji_api",
    "enji_guard_cli.errors",
    "enji_guard_cli.telemetry",
    "enji_guard_cli.transport",
]
forbidden_modules = ["enji_guard_cli.core", "enji_guard_cli.cli", "enji_guard_cli.runtime", "enji_guard_cli.mcp_server"]

[[tool.importlinter.contracts]]
id = "package-dependency-direction"
name = "Package imports flow from entrypoints toward transport"
type = "layers"
layers = [
    "enji_guard_cli.cli",
    "enji_guard_cli.runtime",
    "enji_guard_cli.mcp_server",
    "enji_guard_cli.core",
    "enji_guard_cli.audits",
    "enji_guard_cli.enji_api",
    "enji_guard_cli.auth",
    "enji_guard_cli.transport",
    "enji_guard_cli.telemetry",
    "enji_guard_cli.errors",
]

[[tool.importlinter.contracts]]
id = "entrypoints-avoid-api-transport-and-http-clients"
name = "CLI and MCP entrypoints avoid API adapter, transport internals, and HTTP clients"
type = "forbidden"
source_modules = ["enji_guard_cli.cli", "enji_guard_cli.runtime", "enji_guard_cli.mcp_server"]
forbidden_modules = ["enji_guard_cli.enji_api", "enji_guard_cli.transport", "httpx", "httpx_retries"]
allow_indirect_imports = true

[[tool.importlinter.contracts]]
id = "httpx-stays-behind-transport"
name = "HTTP client dependency stays behind transport"
type = "forbidden"
source_modules = [
    "enji_guard_cli.auth",
    "enji_guard_cli.cli",
    "enji_guard_cli.core",
    "enji_guard_cli.enji_api",
    "enji_guard_cli.mcp_server",
    "enji_guard_cli.runtime",
    "enji_guard_cli.telemetry",
]
forbidden_modules = ["httpx", "httpx_retries"]
allow_indirect_imports = true

[[tool.importlinter.contracts]]
id = "frameworks-stay-in-entrypoints"
name = "Typer and MCP frameworks stay out of core, adapter, auth, and transport"
type = "forbidden"
source_modules = [
    "enji_guard_cli.auth",
    "enji_guard_cli.audits",
    "enji_guard_cli.core",
    "enji_guard_cli.enji_api",
    "enji_guard_cli.errors",
    "enji_guard_cli.telemetry",
    "enji_guard_cli.transport",
]
forbidden_modules = ["typer", "mcp"]
allow_indirect_imports = true

[dependency-groups]
dev = [
    "actionlint-py>=1.7.12.24",
    "basedpyright>=1.39.8",
    "deptry>=0.25",
    "import-linter>=2.12",
    "pytest>=9.1.1",
    "pytest-cov>=7",
    "pytest-crap>=0.3.0",
    "pytest-xdist>=3.8.0",
    "radon>=6.0.1",
    "ruff>=0.15.18",
    "vulture>=2.16",
]
