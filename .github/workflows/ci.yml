name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_LINK_MODE: hardlink

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      requires-code-checks: ${{ steps.classify.outputs.requires-code-checks }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "schedule" ] || [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "requires-code-checks=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -z "${BASE_SHA}" ] || [[ "${BASE_SHA}" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 "${HEAD_SHA}")"
          fi

          changed_files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          if [ -z "${changed_files}" ]; then
            echo "requires-code-checks=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if echo "${changed_files}" | grep -Ev '^(\.planning/|docs/|README[.]md$|AGENTS[.]md$|CHANGELOG[.]md$|ROADMAP[.]md$|SECURITY[.]md$|.*[.]md$)' >/dev/null; then
            echo "requires-code-checks=true" >> "${GITHUB_OUTPUT}"
          else
            echo "requires-code-checks=false" >> "${GITHUB_OUTPUT}"
          fi

  quality:
    needs: [changes]
    if: needs.changes.outputs.requires-code-checks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Static quality gate
        run: just check

  test:
    needs: [changes]
    if: needs.changes.outputs.requires-code-checks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Unit tests
        run: just unit

  crap:
    needs: [changes]
    if: needs.changes.outputs.requires-code-checks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: CRAP gate
        run: just crap-check

  docker-build:
    needs: [changes]
    if: needs.changes.outputs.requires-code-checks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: false
          tags: enji-guard-cli:ci

  ci:
    if: always()
    runs-on: ubuntu-latest
    needs: [changes, quality, test, crap, docker-build]
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            exit 1
          fi
