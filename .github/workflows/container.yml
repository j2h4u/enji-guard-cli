name: Container

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish, for example v0.2.0."
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.release_tag || github.event.release.tag_name || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  changes:
    if: >-
      ${{
        github.event_name != 'workflow_run' ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.head_repository.full_name == github.repository &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}
    runs-on: ubuntu-latest
    outputs:
      requires-image-publish: ${{ steps.classify.outputs.requires-image-publish }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Classify changed files
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          python3 scripts/classify_changed_files.py \
            --event-name "${EVENT_NAME}" \
            --head-sha "${HEAD_SHA}" \
            --force-event workflow_run \
            --force-event release \
            --force-event workflow_dispatch \
            --output-key requires-image-publish

  publish:
    needs: [changes]
    if: >-
      ${{
        (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
        needs.changes.outputs.requires-image-publish == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag || github.event.release.tag_name || github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: release-metadata
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          release_tag="${INPUT_RELEASE_TAG:-${EVENT_RELEASE_TAG}}"
          source_sha="$(git rev-parse HEAD)"
          if [ -z "${release_tag}" ]; then
            release_tag="$(git tag --points-at "${source_sha}" --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
          fi
          echo "release-tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "source-sha=${source_sha}" >> "${GITHUB_OUTPUT}"

      - name: Resolve image tags
        id: image-tags
        env:
          RELEASE_TAG: ${{ steps.release-metadata.outputs.release-tag }}
          SOURCE_SHA: ${{ steps.release-metadata.outputs.source-sha }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:sha-${SOURCE_SHA}"
            if [[ "${RELEASE_TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
              echo "${IMAGE_NAME}:${RELEASE_TAG}"
              echo "${IMAGE_NAME}:${RELEASE_TAG#v}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve package version
        id: package-version
        env:
          RELEASE_TAG: ${{ steps.release-metadata.outputs.release-tag }}
          SOURCE_SHA: ${{ steps.release-metadata.outputs.source-sha }}
        run: |
          mapfile -t base_tags < <(git tag --merged "${SOURCE_SHA}" --list 'v*' | sort -V)
          args=(--source-sha "${SOURCE_SHA}")
          [ -n "${RELEASE_TAG}" ] && args+=(--release-tag "${RELEASE_TAG}")
          for base_tag in "${base_tags[@]}"; do args+=(--base-tag "${base_tag}"); done
          version="$(uv run --locked python scripts/release_version.py "${args[@]}")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build candidate image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: ${{ steps.image-tags.outputs.tags }}
          build-args: |
            PACKAGE_VERSION=${{ steps.package-version.outputs.version }}
            SOURCE_COMMIT=${{ steps.release-metadata.outputs.source-sha }}

      - name: Verify candidate runtime contract
        env:
          IMAGE_TAGS: ${{ steps.image-tags.outputs.tags }}
          EXPECTED_VERSION: ${{ steps.package-version.outputs.version }}
          EXPECTED_SHA: ${{ steps.release-metadata.outputs.source-sha }}
        run: |
          candidate="$(printf '%s\n' "${IMAGE_TAGS}" | head -n 1)"
          uv run --locked python -m scripts.release_contract \
            --image "${candidate}" \
            --expected-version "${EXPECTED_VERSION}" \
            --expected-sha "${EXPECTED_SHA}"

      - name: Scan candidate image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:latest
          scanners: vuln
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Publish tested image
        env:
          IMAGE_TAGS: ${{ steps.image-tags.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -n "${tag}" ] && docker push "${tag}"
          done <<< "${IMAGE_TAGS}"
