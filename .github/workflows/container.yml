name: Container

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish, for example v0.2.0."
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.release_tag || github.event.release.tag_name || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  changes:
    if: >-
      ${{
        github.event_name != 'workflow_run' ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.head_repository.full_name == github.repository &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}
    runs-on: ubuntu-latest
    outputs:
      requires-image-publish: ${{ steps.classify.outputs.requires-image-publish }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Classify changed files
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          if [ "${EVENT_NAME}" = "release" ] || [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "requires-image-publish=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          BASE_SHA="$(git show -s --format=%P "${HEAD_SHA}" | awk '{print $1}')"
          if [ -z "${BASE_SHA}" ] || [[ "${BASE_SHA}" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 "${HEAD_SHA}")"
          fi

          changed_files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          if [ -z "${changed_files}" ]; then
            echo "requires-image-publish=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if echo "${changed_files}" | grep -Ev '^(\.planning/|docs/|README[.]md$|AGENTS[.]md$|CHANGELOG[.]md$|ROADMAP[.]md$|SECURITY[.]md$|.*[.]md$)' >/dev/null; then
            echo "requires-image-publish=true" >> "${GITHUB_OUTPUT}"
          else
            echo "requires-image-publish=false" >> "${GITHUB_OUTPUT}"
          fi

  publish:
    needs: [changes]
    if: >-
      ${{
        (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
        needs.changes.outputs.requires-image-publish == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag || github.event.release.tag_name || github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: release-metadata
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          release_tag="${INPUT_RELEASE_TAG:-${EVENT_RELEASE_TAG}}"
          source_sha="$(git rev-parse HEAD)"
          if [ -z "${release_tag}" ]; then
            release_tag="$(git tag --points-at "${source_sha}" --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
          fi
          echo "release-tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "source-sha=${source_sha}" >> "${GITHUB_OUTPUT}"

      - name: Resolve image tags
        id: image-tags
        env:
          RELEASE_TAG: ${{ steps.release-metadata.outputs.release-tag }}
          SOURCE_SHA: ${{ steps.release-metadata.outputs.source-sha }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:sha-${SOURCE_SHA}"
            if [[ "${RELEASE_TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
              echo "${IMAGE_NAME}:${RELEASE_TAG}"
              echo "${IMAGE_NAME}:${RELEASE_TAG#v}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve package version
        id: package-version
        env:
          RELEASE_TAG: ${{ steps.release-metadata.outputs.release-tag }}
          SOURCE_SHA: ${{ steps.release-metadata.outputs.source-sha }}
        run: |
          if [[ "${RELEASE_TAG}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            version="${RELEASE_TAG#v}"
          else
            version="0.0.0+sha.${SOURCE_SHA:0:12}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Publish image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          build-args: |
            PACKAGE_VERSION=${{ steps.package-version.outputs.version }}
