name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 7 * * 1"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      requires-codeql: ${{ steps.classify.outputs.requires-codeql }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 scripts/classify_changed_files.py \
            --event-name "${EVENT_NAME}" \
            --base-sha "${BASE_SHA}" \
            --head-sha "${HEAD_SHA}" \
            --force-event schedule \
            --output-key requires-codeql

  analyze:
    name: Analyze Python
    needs: [changes]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Skip docs-only change
        if: needs.changes.outputs.requires-codeql != 'true'
        run: echo "No CodeQL analysis required."

      - name: Checkout
        if: needs.changes.outputs.requires-codeql == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        if: needs.changes.outputs.requires-codeql == 'true'
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL Analysis
        if: needs.changes.outputs.requires-codeql == 'true'
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:python"
          upload: always
