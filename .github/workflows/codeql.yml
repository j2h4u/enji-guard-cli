name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 7 * * 1"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      requires-codeql: ${{ steps.classify.outputs.requires-codeql }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "schedule" ]; then
            echo "requires-codeql=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -z "${BASE_SHA}" ] || [[ "${BASE_SHA}" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 "${HEAD_SHA}")"
          fi

          changed_files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          if [ -z "${changed_files}" ]; then
            echo "requires-codeql=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if echo "${changed_files}" | grep -Ev '^(\.planning/|docs/|README[.]md$|AGENTS[.]md$|CHANGELOG[.]md$|ROADMAP[.]md$|SECURITY[.]md$|.*[.]md$)' >/dev/null; then
            echo "requires-codeql=true" >> "${GITHUB_OUTPUT}"
          else
            echo "requires-codeql=false" >> "${GITHUB_OUTPUT}"
          fi

  analyze:
    name: Analyze Python
    needs: [changes]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Skip docs-only change
        if: needs.changes.outputs.requires-codeql != 'true'
        run: echo "No CodeQL analysis required."

      - name: Checkout
        if: needs.changes.outputs.requires-codeql == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        if: needs.changes.outputs.requires-codeql == 'true'
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL Analysis
        if: needs.changes.outputs.requires-codeql == 'true'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:python"
          upload: always
