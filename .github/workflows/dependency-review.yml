name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      requires-dependency-review: ${{ steps.classify.outputs.requires-dependency-review }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 scripts/classify_changed_files.py \
            --event-name "${EVENT_NAME}" \
            --base-sha "${BASE_SHA}" \
            --head-sha "${HEAD_SHA}" \
            --output-key requires-dependency-review

  dependency-review:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - name: Skip docs-only change
        if: needs.changes.outputs.requires-dependency-review != 'true'
        run: echo "No dependency review required."

      - name: Checkout
        if: needs.changes.outputs.requires-dependency-review == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency review
        if: needs.changes.outputs.requires-dependency-review == 'true'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
