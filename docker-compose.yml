services:
  enji-guard-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: enji-guard-cli:local
    container_name: enji-guard-cli
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8001:8000"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "enji-guard", "health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - ${HOME}/.config/enji-guard:/home/app/.config/enji-guard
