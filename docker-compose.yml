services:
  enji-guard-cli:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Local images must always identify the source that produced them.
        # `just docker-build` and `just docker-up` compute these from the
        # installed package and current checkout before invoking Compose.
        PACKAGE_VERSION: ${PACKAGE_VERSION:?run 'just docker-build' or 'just docker-up' to supply package provenance}
        SOURCE_COMMIT: ${SOURCE_COMMIT:?run 'just docker-build' or 'just docker-up' to supply source provenance}
    image: enji-guard-cli:local
    container_name: enji-guard-cli
    command: ["run", "--transport", "streamable-http", "--host", "0.0.0.0", "--allow-external-host"]
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${ENJI_GUARD_MCP_HOST_PORT:-18080}:8000"
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 128
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "enji-guard", "health", "--ready"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
      - type: bind
        source: ${HOME}/.config/enji-guard
        target: /home/app/.config/enji-guard
        bind:
          create_host_path: false
